  <script>
  (function () {
    var media = window.matchMedia('(prefers-color-scheme: dark)');

    function syncThemeControls(isDark) {
      var darkBtns = document.querySelectorAll('[data-theme-role="dark"]');
      var lightBtns = document.querySelectorAll('[data-theme-role="light"]');
      if (!darkBtns.length && !lightBtns.length) return;

      if (isDark) {
        lightBtns.forEach(function (el) { el.classList.remove('hidden'); });
        darkBtns.forEach(function (el) { el.classList.add('hidden'); });
      } else {
        lightBtns.forEach(function (el) { el.classList.add('hidden'); });
        darkBtns.forEach(function (el) { el.classList.remove('hidden'); });
      }
    }

    function syncAppleMusicEmbeds(isDark) {
      var theme = isDark ? 'dark' : 'light';
      document.querySelectorAll('iframe[src*="embed.music.apple.com"]').forEach(function (f) {
        try {
          var url = new URL(f.src);
          if (url.searchParams.get('theme') === theme) return;
          url.searchParams.set('theme', theme);
          f.src = url.toString();
        } catch (_) {}
      });
    }

    function applyTheme(isDark) {
      document.documentElement.classList.toggle('darkmode', isDark);
      syncThemeControls(isDark);
      syncAppleMusicEmbeds(isDark);
    }

    function preferredIsDark() {
      var stored = localStorage.getItem('preferredTheme');
      if (stored === 'dark') return true;
      if (stored === 'light') return false;
      return media.matches;
    }

    window.setDarkMode = function (isDark) {
      localStorage.setItem('preferredTheme', isDark ? 'dark' : 'light');
      applyTheme(isDark);
    };

    applyTheme(preferredIsDark());

    document.addEventListener('DOMContentLoaded', function () {
      applyTheme(document.documentElement.classList.contains('darkmode'));
    }, { once: true });

    function handleSystemThemeChange(e) {
      if (!localStorage.getItem('preferredTheme')) {
        applyTheme(e.matches);
      }
    }

    if (typeof media.addEventListener === 'function') {
      media.addEventListener('change', handleSystemThemeChange);
    } else if (typeof media.addListener === 'function') {
      media.addListener(handleSystemThemeChange);
    }
  })();
</script>

  <script>
  window.createMomentumScroller = function (el) {
    var velocity = 0;
    var animating = false;
    var FRICTION = 0.88;
    var MIN_VELOCITY = 0.5;

    function tick() {
      if (Math.abs(velocity) < MIN_VELOCITY) {
        velocity = 0;
        animating = false;
        return;
      }
      var maxScrollLeft = el.scrollWidth - el.clientWidth;
      el.scrollLeft = Math.max(0, Math.min(maxScrollLeft, el.scrollLeft + velocity));
      velocity *= FRICTION;
      requestAnimationFrame(tick);
    }

    return function addVelocity(delta) {
      velocity += delta;
      if (!animating) {
        animating = true;
        requestAnimationFrame(tick);
      }
    };
  };
</script>

  <script>
    (function () {
      var DETAILS_ANIM_MS = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--details-anim-ms')) || 200;

      function isNativeSummary(el) {
        return el && el.tagName === 'SUMMARY' && el.parentElement && el.parentElement.tagName === 'DETAILS';
      }

      function toggleDetailsWithCloseAnim(details) {
        if (!details || details.classList.contains('is-closing')) return;

        if (details.open) {
          details.classList.add('is-closing');
          window.setTimeout(function () {
            details.open = false;
            details.classList.remove('is-closing');
          }, DETAILS_ANIM_MS);
          return;
        }

        details.open = true;
      }

      document.addEventListener('click', function (event) {
        var target = event.target;
        if (!target || !target.closest) return;

        var summary = target.closest('summary');
        if (!isNativeSummary(summary)) return;
        if (summary.closest('.tategaki-content')) return;

        event.preventDefault();
        toggleDetailsWithCloseAnim(summary.parentElement);
      }, true);

      document.addEventListener('keydown', function (event) {
        if (event.key !== 'Enter' && event.key !== ' ') return;

        var target = event.target;
        if (!isNativeSummary(target)) return;
        if (target.closest('.tategaki-content')) return;

        event.preventDefault();
        toggleDetailsWithCloseAnim(target.parentElement);
      }, true);
    })();
  </script>

  <script>
    // Reposition .exif-right labels to sit 0.75em from the image's actual right
    // edge. The CSS formula assumes break-out width, but max-height: 100vh makes
    // portrait images narrower than that, so we measure the real rendered edge.
    (function () {
      function repositionExif(para) {
        var exifEl = para.querySelector('.exif-right');
        if (!exifEl) return;
        var img = para.querySelector('img:not(.icon)');
        if (!img) return;
        var imgRect = img.getBoundingClientRect();
        if (imgRect.width === 0) return; // not yet laid out
        var paraRect = para.getBoundingClientRect();
        var gap = 0.75 * parseFloat(getComputedStyle(exifEl).fontSize);
        exifEl.style.left = (imgRect.right - paraRect.left + gap) + 'px';
      }

      function init() {
        // Skip xpan paragraphs — their EXIF position is set separately by CSS.
        var paras = document.querySelectorAll('.exif-para:not([data-xpan])');
        if (!paras.length) return;

        if (typeof ResizeObserver !== 'undefined') {
          var ro = new ResizeObserver(function (entries) {
            entries.forEach(function (entry) {
              var para = entry.target.closest('.exif-para');
              if (para) repositionExif(para);
            });
          });
          paras.forEach(function (para) {
            var img = para.querySelector('img:not(.icon)');
            if (img) ro.observe(img);
          });
        } else {
          // Fallback for older browsers.
          paras.forEach(repositionExif);
          window.addEventListener('resize', function () { paras.forEach(repositionExif); });
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
